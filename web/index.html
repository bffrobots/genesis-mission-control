<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Genesis Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
/* ═══════════════════════════════════════════════════════════
   GENESIS MISSION CONTROL — Orbital Command Design System
   Standalone CSS for ARC HTTP Server Custom
   ═══════════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0e1a;
  --bg-surface: #111628;
  --bg-elevated: #1a2035;
  --bg-panel: #141929;
  --border: #252b40;
  --border-light: #1e2438;
  --text: #e0e6f0;
  --text-dim: #8892a8;
  --text-muted: #5a6380;
  --cyan: #00d4ff;
  --cyan-dim: rgba(0,212,255,0.15);
  --cyan-glow: rgba(0,212,255,0.3);
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.15);
  --amber: #ffb020;
  --amber-dim: rgba(255,176,32,0.15);
  --red: #ff2d55;
  --red-dim: rgba(255,45,85,0.15);
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-body: 'IBM Plex Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #2a3050; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a4060; }

/* ── APP LAYOUT ── */
.mc-app { width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── HEADER ── */
.mc-header {
  display: flex; align-items: center; justify-content: space-between;
  height: 48px; padding: 0 12px;
  background: var(--bg-surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 50; position: relative;
}
.mc-header::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3), transparent);
}
.mc-header-left, .mc-header-right { display: flex; align-items: center; gap: 12px; }
.mc-header-center { display: flex; align-items: center; }

.mc-logo { display: flex; align-items: center; gap: 8px; }
.mc-logo-icon {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  background: var(--cyan-dim); border: 1px solid rgba(0,212,255,0.25); border-radius: 6px; color: var(--cyan);
}
.mc-logo-text { display: flex; flex-direction: column; line-height: 1; }
.mc-logo-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; letter-spacing: 0.08em; color: #f0f4ff; }
.mc-logo-sub { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.15em; color: var(--text-muted); margin-top: 1px; }

.mc-status-group { display: flex; align-items: center; gap: 16px; }
.mc-status-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); }
.mc-status-item svg { color: var(--text-muted); }
.status-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.03em; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-ok { background: var(--green); box-shadow: 0 0 6px rgba(74,222,128,0.6); }
.dot-warn { background: var(--amber); box-shadow: 0 0 6px rgba(255,176,32,0.6); }
.dot-err { background: var(--red); box-shadow: 0 0 6px rgba(255,45,85,0.6); }

.mc-uptime { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
.mc-uptime svg { color: #4a5270; }

.mc-estop {
  display: flex; align-items: center; gap: 5px; padding: 4px 14px;
  background: #8b1a2b; color: white; border: 1px solid #b52240; border-radius: 6px;
  font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
  cursor: pointer; transition: all 0.15s; animation: estop-glow 2.5s ease-in-out infinite;
}
.mc-estop:hover { background: #a52040; transform: scale(1.03); }
.mc-estop:active { transform: scale(0.97); }
@keyframes estop-glow {
  0%, 100% { box-shadow: 0 0 8px rgba(181,34,64,0.3); }
  50% { box-shadow: 0 0 18px rgba(181,34,64,0.6); }
}

/* ── BODY ── */
.mc-body { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
.mc-sidebar {
  width: 180px; background: var(--bg-surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.25s ease; position: relative;
}
.mc-sidebar.collapsed { width: 52px; }
.mc-sidebar.collapsed .nav-label { display: none; }
.mc-sidebar.collapsed .mc-nav-btn { justify-content: center; padding: 10px 0; }
.mc-nav-items { flex: 1; padding: 8px 6px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
.mc-nav-btn {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  border: none; background: transparent; color: var(--text-muted); border-radius: 6px;
  cursor: pointer; transition: all 0.15s; font-size: 12.5px; font-family: var(--font-body);
  text-align: left; white-space: nowrap;
}
.mc-nav-btn:hover { background: var(--bg-elevated); color: var(--text-dim); }
.mc-nav-btn.active { background: var(--cyan-dim); color: var(--cyan); }
.mc-nav-btn.active .nav-icon svg { color: var(--cyan); }
.nav-icon { display: flex; align-items: center; flex-shrink: 0; }
.nav-icon svg { width: 18px; height: 18px; }
.mc-sidebar-toggle {
  display: flex; align-items: center; justify-content: center; padding: 8px;
  border: none; background: transparent; color: var(--text-muted); cursor: pointer;
  border-top: 1px solid var(--border-light); transition: color 0.15s;
}
.mc-sidebar-toggle:hover { color: var(--text); }
.mc-sidebar.collapsed .mc-sidebar-toggle svg { transform: rotate(180deg); }

/* ── MAIN ── */
.mc-main { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px 20px; }

/* ── TABS ── */
.mc-tab { display: none; }
.mc-tab.active { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── TAB HEADER ── */
.tab-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.tab-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: -0.01em; color: #f0f4ff; margin: 0; }
.tab-subtitle { font-size: 12.5px; color: var(--text-muted); margin: 2px 0 0 0; }
.tab-actions { display: flex; gap: 8px; align-items: center; }

/* ── PANELS ── */
.panel {
  background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px;
  overflow: hidden; position: relative;
}
.panel::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.25), transparent); z-index: 1;
}
.panel-header {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  border-bottom: 1px solid var(--border-light); font-family: var(--font-display);
  font-size: 13px; font-weight: 600; color: #d0d8e8;
}
.panel-icon { font-size: 14px; }
.panel-title { flex-shrink: 0; }
.panel-body { padding: 12px 14px; }
.panel-value { margin-left: auto; font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--cyan); }
.panel-badge { margin-left: auto; font-size: 10px; font-family: var(--font-mono); padding: 2px 8px; border-radius: 4px; letter-spacing: 0.04em; }
.panel-badge-sm { margin-left: auto; font-size: 10px; font-family: var(--font-mono); padding: 1px 6px; border-radius: 3px; background: var(--bg-elevated); color: var(--text-muted); }
.badge-live { display: flex; align-items: center; gap: 5px; background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,222,128,0.25); }
.dot-pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 4px rgba(74,222,128,0.6); }
  50% { opacity: 0.5; box-shadow: 0 0 8px rgba(74,222,128,0.3); }
}
.panel-desc { font-size: 11.5px; color: var(--text-muted); line-height: 1.5; margin: 0 0 10px 0; }
.panel-info { display: flex; gap: 8px; align-items: flex-start; font-size: 11px; color: var(--text-muted); line-height: 1.5; }
.panel-info p { margin: 0; }
.info-icon { font-size: 14px; flex-shrink: 0; }
.panel-full { grid-column: 1 / -1; }
.panel-wide { grid-column: span 2; }

/* ── DASHBOARD GRID ── */
.dash-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }

/* ── CAMERA VIEW ── */
.camera-view { position: relative; background: #080c16; overflow: hidden; }
.camera-placeholder { position: relative; width: 100%; padding-bottom: 56.25%; overflow: hidden; }
.camera-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
.camera-hud { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.35; mix-blend-mode: screen; pointer-events: none; }
.camera-robot { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); height: 80%; object-fit: contain; filter: drop-shadow(0 0 20px rgba(0,212,255,0.3)); }
.camera-overlay-tl { position: absolute; top: 10px; left: 10px; z-index: 5; }
.camera-overlay-br { position: absolute; bottom: 10px; right: 10px; z-index: 5; }
.cam-info { font-family: var(--font-mono); font-size: 10px; color: var(--cyan); background: rgba(10,14,26,0.8); padding: 2px 8px; border-radius: 3px; border: 1px solid rgba(0,212,255,0.2); margin-bottom: 4px; }
.cam-info-green { color: var(--green); border-color: rgba(74,222,128,0.2); }
.cam-res-label { margin-left: auto; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-right: 8px; }

.detection-box { position: absolute; border: 1.5px solid var(--cyan); border-radius: 3px; z-index: 4; }
.detection-box.det-green { border-color: var(--green); }
.detection-box.det-amber { border-color: var(--amber); }
.det-label { position: absolute; top: -18px; left: -1px; font-family: var(--font-mono); font-size: 9px; color: var(--bg); background: var(--cyan); padding: 1px 5px; border-radius: 2px; white-space: nowrap; }
.det-label-green { background: var(--green); }
.det-label-amber { background: var(--amber); }
.face-circle { position: absolute; border: 1.5px dashed rgba(0,212,255,0.7); border-radius: 50%; z-index: 4; }
.face-label { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); font-family: var(--font-mono); font-size: 9px; color: var(--cyan); white-space: nowrap; background: rgba(10,14,26,0.8); padding: 1px 5px; border-radius: 2px; }

/* ── STATUS ROWS ── */
.status-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 12px; border-bottom: 1px solid var(--border-light); }
.status-row:last-child { border-bottom: none; }
.status-row span:first-child { color: var(--text-muted); }
.val-ok { color: var(--green); font-family: var(--font-mono); font-size: 11px; }
.val-warn { color: var(--amber); font-family: var(--font-mono); font-size: 11px; }
.val-err { color: var(--red); font-family: var(--font-mono); font-size: 11px; }
.val-mono { font-family: var(--font-mono); font-size: 11px; color: var(--text); }
.val-cyan { color: var(--cyan); font-family: var(--font-mono); font-size: 11px; }

/* ── PROGRESS BAR ── */
.progress-bar { height: 4px; background: var(--bg-elevated); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--green)); border-radius: 2px; transition: width 0.5s ease; }
.chart-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); text-align: center; margin-top: 6px; letter-spacing: 0.06em; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
  border: 1px solid var(--border); border-radius: 6px; font-family: var(--font-body);
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  background: var(--bg-elevated); color: var(--text-dim);
}
.btn:hover { background: #222840; }
.btn-primary { background: var(--cyan-dim); border-color: rgba(0,212,255,0.3); color: var(--cyan); }
.btn-primary:hover { background: rgba(0,212,255,0.25); box-shadow: 0 0 12px rgba(0,212,255,0.2); }
.btn-outline { background: transparent; border-color: var(--border); color: var(--text-dim); }
.btn-outline:hover { background: var(--bg-elevated); }
.btn-danger { background: var(--red-dim); border-color: rgba(255,45,85,0.4); color: var(--red); }
.btn-danger:hover { background: rgba(255,45,85,0.2); }
.btn-full { width: 100%; justify-content: center; margin-top: 6px; }
.btn-icon { padding: 6px 10px; border-radius: 6px; }
.btn-icon-sm { padding: 4px 10px; border-radius: 5px; font-size: 14px; font-weight: 700; }
.btn-active { background: rgba(0,212,255,0.25) !important; border-color: rgba(0,212,255,0.5) !important; color: var(--cyan) !important; box-shadow: 0 0 12px rgba(0,212,255,0.2); }
.btn-tiny { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: var(--cyan-dim); border: 1px solid rgba(0,212,255,0.25); color: var(--cyan); cursor: pointer; transition: all 0.15s; }
.btn-tiny:hover { background: rgba(0,212,255,0.25); }
.btn-icon-tiny { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 10px; transition: all 0.15s; }
.btn-icon-tiny:hover { background: var(--bg-elevated); color: var(--text); }
.btn-icon-tiny.btn-play { color: var(--cyan); border-color: rgba(0,212,255,0.25); }
.btn-icon-tiny.btn-play:hover { background: var(--cyan-dim); }
.btn-icon-tiny.btn-delete { color: var(--red); border-color: rgba(255,45,85,0.25); }
.btn-icon-tiny.btn-delete:hover { background: var(--red-dim); }

/* ── QUICK ACTIONS ── */
.action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.action-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px;
  background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-dim); font-size: 10px; font-family: var(--font-body); cursor: pointer; transition: all 0.15s;
}
.action-btn:hover { background: #222840; color: var(--text); border-color: rgba(0,212,255,0.3); }
.action-btn:active { transform: scale(0.95); }
.action-btn.action-success { border-color: rgba(74,222,128,0.25); color: var(--green); }
.action-btn.action-warn { border-color: rgba(255,176,32,0.25); color: var(--amber); }

/* ── SERVO OVERVIEW ── */
.servo-overview { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
.servo-mini { display: flex; justify-content: space-between; padding: 3px 6px; font-size: 10px; border-radius: 3px; background: #0d1120; }
.servo-mini-name { color: var(--text-muted); }
.servo-mini-val { font-family: var(--font-mono); color: var(--cyan); }

/* ── SYSTEM BAR ── */
.system-bar { margin-top: 12px; }
.system-bar-content { display: flex; align-items: center; gap: 20px; padding: 8px 14px; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em; flex-wrap: wrap; }
.system-bar-time { margin-left: auto; color: var(--text-dim); }

/* ── INPUTS ── */
.mc-input { width: 100%; padding: 6px 10px; background: #0d1120; border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: var(--font-body); font-size: 12px; outline: none; transition: border-color 0.15s; }
.mc-input:focus { border-color: rgba(0,212,255,0.5); box-shadow: 0 0 0 2px rgba(0,212,255,0.1); }
.mc-input::placeholder { color: #3a4060; }
.mc-select { width: 100%; padding: 6px 10px; background: #0d1120; border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: var(--font-body); font-size: 12px; outline: none; cursor: pointer; margin-top: 6px; }
.mc-select-sm { width: auto; margin-top: 0; padding: 3px 8px; font-size: 10px; }
.mc-range { width: 100%; height: 4px; -webkit-appearance: none; appearance: none; background: var(--bg-elevated); border-radius: 2px; outline: none; margin-top: 6px; }
.mc-range::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--cyan); cursor: pointer; border: 2px solid var(--bg); box-shadow: 0 0 6px rgba(0,212,255,0.4); }
.input-label { display: block; font-size: 11px; color: var(--text-muted); margin-top: 10px; margin-bottom: 2px; }

/* ── SWITCH ── */
.mc-switch { position: relative; display: inline-block; width: 34px; height: 18px; }
.mc-switch input { opacity: 0; width: 0; height: 0; }
.switch-slider { position: absolute; inset: 0; background: var(--bg-elevated); border-radius: 9px; transition: all 0.2s; cursor: pointer; }
.switch-slider::before { content: ''; position: absolute; width: 14px; height: 14px; left: 2px; bottom: 2px; background: var(--text-muted); border-radius: 50%; transition: all 0.2s; }
.mc-switch input:checked + .switch-slider { background: rgba(0,212,255,0.3); }
.mc-switch input:checked + .switch-slider::before { transform: translateX(16px); background: var(--cyan); box-shadow: 0 0 6px rgba(0,212,255,0.5); }
.setting-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 12px; color: var(--text-dim); }

/* ── MOTION CONTROL ── */
.motion-grid { display: grid; grid-template-columns: 1fr 320px; gap: 12px; }
.motion-servos { display: flex; flex-direction: column; gap: 8px; }
.motion-sidebar { display: flex; flex-direction: column; gap: 8px; }
.servo-group.collapsed .servo-sliders { display: none; }
.servo-group.collapsed .chevron { transform: rotate(-90deg); }
.servo-group-toggle { cursor: pointer; background: none; border: none; width: 100%; text-align: left; }
.chevron { margin-left: auto; color: var(--text-muted); transition: transform 0.2s; }
.servo-slider-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
.servo-label { width: 120px; font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
.servo-range { flex: 1; }
.servo-val { width: 36px; text-align: right; font-family: var(--font-mono); font-size: 11px; color: var(--cyan); flex-shrink: 0; }

.rec-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); display: inline-block; }
.rec-dot-active { background: var(--red); animation: rec-blink 1s ease-in-out infinite; }
@keyframes rec-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.recording-status { display: flex; align-items: center; gap: 10px; }
.rec-indicator { width: 12px; height: 12px; border-radius: 50%; background: var(--red); animation: rec-blink 1s ease-in-out infinite; box-shadow: 0 0 10px rgba(255,45,85,0.5); }
.rec-title { font-family: var(--font-display); font-size: 12px; font-weight: 700; color: var(--red); letter-spacing: 0.06em; }
.rec-frames { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
.hidden { display: none !important; }
.panel-recording { border-color: rgba(255,45,85,0.4); box-shadow: 0 0 12px rgba(255,45,85,0.15); }

.pose-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border-light); }
.pose-item:last-child { border-bottom: none; }
.pose-info { flex: 1; min-width: 0; }
.pose-name { font-size: 12px; color: var(--text); display: block; }
.pose-cat { font-size: 10px; color: var(--text-muted); }
.bff-link { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--cyan); text-decoration: none; margin-top: 8px; transition: color 0.15s; }
.bff-link:hover { color: #40e0ff; text-decoration: underline; }

/* ── VOICE & CHAT ── */
.voice-grid { display: grid; grid-template-columns: 1fr 280px; gap: 12px; height: calc(100vh - 160px); }
.voice-chat-panel { display: flex; flex-direction: column; }
.voice-sidebar { display: flex; flex-direction: column; gap: 8px; }
.chat-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; min-height: 200px; }
.chat-msg { display: flex; gap: 8px; max-width: 85%; }
.chat-msg.chat-user { align-self: flex-end; flex-direction: row-reverse; }
.chat-msg.chat-assistant, .chat-msg.chat-system { align-self: flex-start; }
.chat-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }

.map-view { position: relative; min-height: 400px; background: #080c16; overflow: hidden; }

// ── TOAST ──
function showToast(msg) {
  var container = document.getElementById("mc-toast-container");
  if (!container) {
    container = document.createElement("div");
    container.id = "mc-toast-container";
    container.style.cssText = "position:fixed;top:60px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;";
    document.body.appendChild(container);
  }
  var toast = document.createElement("div");
  toast.className = "mc-toast";
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(function() { toast.classList.add("mc-toast-exit"); }, 2500);
  setTimeout(function() { toast.remove(); }, 3000);
}

// ── CHARTS ──
function drawAreaChart(canvasId, data, color, fillAlpha) {
  if (fillAlpha === undefined) fillAlpha = 0.2;
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext("2d");
  if (!ctx) return;
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  var w = rect.width, h = rect.height;
  var min = Math.min.apply(null, data) - 2;
  var max = Math.max.apply(null, data) + 2;
  var range = max - min || 1;
  ctx.clearRect(0, 0, w, h);
  ctx.beginPath();
  ctx.moveTo(0, h);
  data.forEach(function(v, i) { ctx.lineTo((i / (data.length - 1)) * w, h - ((v - min) / range) * h); });
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fillStyle = color.replace("1)", fillAlpha + ")").replace("rgb", "rgba");
  ctx.fill();
  ctx.beginPath();
  data.forEach(function(v, i) {
    var x = (i / (data.length - 1)) * w, y = h - ((v - min) / range) * h;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawMultiLineChart(canvasId, datasets) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext("2d");
  if (!ctx) return;
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  var w = rect.width, h = rect.height - 20;
  var allData = [];
  datasets.forEach(function(d) { allData = allData.concat(d.data); });
  var min = Math.min.apply(null, allData) - 0.5;
  var max = Math.max.apply(null, allData) + 0.5;
  var range = max - min || 1;
  ctx.clearRect(0, 0, rect.width, rect.height);
  datasets.forEach(function(ds) {
    ctx.beginPath();
    ds.data.forEach(function(v, i) {
      var x = (i / (ds.data.length - 1)) * w, y = h - ((v - min) / range) * h;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.strokeStyle = ds.color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });
  var lx = 8;
  ctx.font = "10px 'JetBrains Mono', monospace";
  datasets.forEach(function(ds) {
    ctx.fillStyle = ds.color;
    ctx.fillRect(lx, h + 6, 12, 3);
    ctx.fillStyle = "rgba(200,210,230,0.7)";
    ctx.fillText(ds.label, lx + 16, h + 12);
    lx += ctx.measureText(ds.label).width + 32;
  });
}

function drawBarChart(canvasId, items) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext("2d");
  if (!ctx) return;
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  var w = rect.width, barH = 18, gap = 6, labelW = 80;
  items.forEach(function(item, i) {
    var y = i * (barH + gap) + 4;
    ctx.font = "10px 'JetBrains Mono', monospace";
    ctx.fillStyle = "rgba(200,210,230,0.6)";
    ctx.textBaseline = "middle";
    ctx.fillText(item.label, 0, y + barH / 2);
    ctx.fillStyle = "rgba(255,255,255,0.05)";
    ctx.fillRect(labelW, y, w - labelW - 30, barH);
    ctx.fillStyle = item.color;
    ctx.fillRect(labelW, y, ((w - labelW - 30) * item.value) / 100, barH);
    ctx.fillStyle = "rgba(200,210,230,0.8)";
    ctx.fillText(item.value + "%", w - 28, y + barH / 2);
  });
}

function updateCharts() {
  drawAreaChart("chart-battery", STATE.sensorHistory.battery, "rgb(120, 220, 150)");
  drawAreaChart("chart-temp", STATE.sensorHistory.temp, "rgb(0, 212, 255)");
  drawAreaChart("chart-distance", STATE.sensorHistory.distance, "rgb(255, 176, 32)", 0.15);
  drawMultiLineChart("chart-imu", [
    { data: STATE.sensorHistory.imuX, color: "rgb(0, 212, 255)", label: "X" },
    { data: STATE.sensorHistory.imuY, color: "rgb(120, 220, 150)", label: "Y" },
    { data: STATE.sensorHistory.imuZ, color: "rgb(255, 176, 32)", label: "Z" }
  ]);
  drawMultiLineChart("chart-batt-temp", [
    { data: STATE.sensorHistory.battery, color: "rgb(120, 220, 150)", label: "Battery %" },
    { data: STATE.sensorHistory.temp, color: "rgb(255, 176, 32)", label: "Temp C" }
  ]);
  var catMap = {};
  STATE.skills.forEach(function(s) { if (!catMap[s.cat]) catMap[s.cat] = []; catMap[s.cat].push(s.rate); });
  var barItems = Object.keys(catMap).map(function(cat) {
    var rates = catMap[cat];
    var avg = Math.round(rates.reduce(function(a, b) { return a + b; }, 0) / rates.length);
    return { label: cat, value: avg, color: avg >= 80 ? "rgb(120,220,150)" : avg >= 50 ? "rgb(255,176,32)" : "rgb(255,45,85)" };
  });
  drawBarChart("chart-skills", barItems);
}

// Send servo command to Genesis backend (port 5000)
function sendServoCommand(servoId, position) {
  var servoPort = "D" + servoId;
  
  // Method 1: Image beacon to ARC HTTP Server (most reliable, no CORS)
  var img = new Image();
  img.src = "http://localhost:8080/set.html?var=$Servo_" + servoPort + "&val=" + position;
  console.log('[Motion Control] Servo ' + servoId + ' (' + servoPort + ') -> ' + position + '°');
  
  // Method 2: Send to backend API for file writing (if available)
  var xhr = new XMLHttpRequest();
  xhr.open('POST', 'http://localhost:5000/api/servo', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.send(JSON.stringify({
    servo_id: servoId,
    position: position,
    port: servoPort,
    timestamp: Date.now()
  }));
}

  });

  document.querySelectorAll(".servo-range").forEach(function(slider) {
    slider.addEventListener("input", function(e) {
      var id = parseInt(e.target.dataset.servo);
      var val = parseInt(e.target.value);

        STATE.servos.forEach(function(s) { frame.servos[s.id] = s.pos; });

  document.querySelectorAll(".servo-group-toggle").forEach(function(btn) {
    btn.addEventListener("click", function() { btn.closest(".servo-group").classList.toggle("collapsed"); });
  });

  var resetBtn = document.getElementById("btn-reset-all");
  if (resetBtn) resetBtn.addEventListener("click", function() {
    STATE.servos.forEach(function(s) {
      s.pos = 90;
      var sl = document.querySelector('[data-servo="' + s.id + '"]');

      setText("servo-val-" + s.id, "90\u00B0");
    });

    addLog("info", "Motion", "All servos reset to neutral (90)");
    showToast("All servos reset to neutral");

  var recordBtn = document.getElementById("btn-record");
  var recordPanel = document.getElementById("recording-panel");
  if (recordBtn) recordBtn.addEventListener("click", function() {
    STATE.isRecording = !STATE.isRecording;
    if (STATE.isRecording) {

      recordBtn.classList.add("btn-danger");
      recordBtn.classList.remove("btn-primary");
      if (recordPanel) recordPanel.classList.remove("hidden");
      addLog("info", "Motion", "Motion recording started");
    } else {
      recordBtn.innerHTML = '<span class="rec-dot"></span> Record Motion';
      recordBtn.classList.remove("btn-danger");
      recordBtn.classList.add("btn-primary");
      if (recordPanel) recordPanel.classList.add("hidden");
      addLog("info", "Motion", "Recording stopped - " + STATE.recordedFrames.length + " frames");
      showToast("Recording stopped - " + STATE.recordedFrames.length + " frames captured");
    }
  });

  var saveBtn = document.getElementById("btn-save-pose");
  if (saveBtn) saveBtn.addEventListener("click", function() {
    var nameInput = document.getElementById("pose-name-input");
    var catSelect = document.getElementById("pose-category-select");

var currentSequence = [];

function initActionSequences() {
  var addBtn = document.getElementById("btn-add-pose-to-seq");
  if (addBtn) addBtn.addEventListener("click", function() {
    var currentPose = {};
    STATE.servos.forEach(function(s) { currentPose[s.id] = s.pos; });
    currentSequence.push({ servos: currentPose, timestamp: Date.now() });
    updateSequencePreview();
    showToast("Pose added to sequence (" + currentSequence.length + " poses)");
  });
  
  var saveBtn = document.getElementById("btn-save-sequence");

    var catSelect = document.getElementById("seq-category-select");
    var name = nameInput ? nameInput.value.trim() : "";
    if (!name) { showToast("Please enter a sequence name"); return; }
    if (currentSequence.length === 0) { showToast("Add poses to sequence first"); return; }
    STATE.actionSequences.push({
      id: "seq-" + Date.now(),
      name: name,
      category: catSelect ? catSelect.value : "Custom",

  });
  
  renderMotionLibrary();

function updateSequencePreview() {
  var preview = document.getElementById("seq-preview");
  if (!preview) return;
  if (currentSequence.length === 0) {
    preview.innerHTML = "No poses added";
  } else {
    preview.innerHTML = currentSequence.map(function(p, i) {
      return '<span style="display:inline-block;background:var(--bg-elevated);padding:2px 6px;margin:2px;border-radius:3px">Pose ' + (i + 1) + '</span>';
    }).join("");

}

// ── MOTION LIBRARY ──
function renderMotionLibrary() {
  var container = document.getElementById("motion-list");
  setText("motion-count", STATE.actionSequences.length);
  if (!container) return;
  
  if (STATE.actionSequences.length === 0) {
    container.innerHTML = '<div style="font-size:11px;color:var(--text-muted);padding:8px 0">No sequences saved. Create action sequences from poses.</div>';
    return;
  }
  
  container.innerHTML = STATE.actionSequences.map(function(seq) {
    return '<div class="pose-item"><div class="pose-info"><span class="pose-name">' + seq.name + '</span><span class="pose-cat">' + seq.category + ' &#8226; ' + seq.poses.length + ' poses</span></div>' +
    '<button class="btn-icon-tiny btn-play" data-seq="' + seq.id + '" title="Play sequence">&#9654;</button>' +
    '<button class="btn-icon-tiny btn-delete" data-seq-del="' + seq.id + '" title="Delete">&#10005;</button></div>';
  }).join("");
  
  container.querySelectorAll(".btn-play").forEach(function(btn) {
    btn.addEventListener("click", function() {
      playSequence(btn.dataset.seq);
    });
  });
  
  container.querySelectorAll(".btn-delete").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var id = btn.dataset.seqDel;
      STATE.actionSequences = STATE.actionSequences.filter(function(s) { return s.id !== id; });
      renderMotionLibrary();
      showToast("Sequence removed");
    });
  });
}

function playSequence(seqId) {
  var seq = STATE.actionSequences.find(function(s) { return s.id === seqId; });
  if (!seq) return;
  
  showToast('Playing sequence: ' + seq.name);
  addLog("info", "Sequence", "Playing: " + seq.name);
  
  var index = 0;
  function playNextPose() {
    if (index >= seq.poses.length) {
      showToast("Sequence completed: " + seq.name);
      return;
    }
    
    var poseData = seq.poses[index];
    Object.keys(poseData.servos).forEach(function(sid) {
      var val = poseData.servos[sid];
      var servo = STATE.servos[parseInt(sid)];
      if (servo) {
        servo.pos = val;
        var sl = document.querySelector('[data-servo="' + sid + '"]');
        if (sl) sl.value = val;
        setText("servo-val-" + sid, val + "\u00B0");
        sendServoCommand(parseInt(sid), val);
      }
    });
    renderServoOverview();
    
    index++;
    setTimeout(playNextPose, 800); // 800ms between poses
  }
  
  playNextPose();
}

var isTrainingMode = false;
var trainingFrames = [];
var trainingStartTime = null;

function initTrainingLibrary() {
  var startBtn = document.getElementById("btn-start-training");
  if (startBtn) startBtn.addEventListener("click", function() {
    isTrainingMode = !isTrainingMode;
    if (isTrainingMode) {
      trainingFrames = [];
      trainingStartTime = Date.now();
      startBtn.textContent = "Stop Training Session";
      startBtn.classList.add("btn-danger");
      startBtn.classList.remove("btn-outline");
      showToast("Training session started - move robot to record frames");
      addLog("info", "Training", "Training session started");
    } else {
      startBtn.textContent = "Start Training Session";
      startBtn.classList.remove("btn-danger");
      startBtn.classList.add("btn-outline");
      showToast("Training session stopped - " + trainingFrames.length + " frames recorded");
      addLog("info", "Training", "Session stopped - " + trainingFrames.length + " frames");
    }
  });
  
  var saveBtn = document.getElementById("btn-save-training");
  if (saveBtn) saveBtn.addEventListener("click", function() {
    var nameInput = document.getElementById("training-name-input");
    var name = nameInput ? nameInput.value.trim() : "";
    if (!name) { showToast("Please enter a training name"); return; }
    if (trainingFrames.length === 0) { showToast("Record frames in training mode first"); return; }
    
    STATE.trainingLibrary.push({
      id: "train-" + Date.now(),
      name: name,
      frames: trainingFrames.slice(),
      duration: Date.now() - trainingStartTime,
      createdAt: new Date().toLocaleString()
    });
    
    if (nameInput) nameInput.value = "";
    trainingFrames = [];
    renderTrainingLibrary();
    addLog("info", "Training", "Saved training: " + name);
    showToast('Training "' + name + '" saved to library');
  });
  
  renderTrainingLibrary();
}

function renderTrainingLibrary() {
  var container = document.getElementById("training-list");
  if (!container) return;
  
  if (STATE.trainingLibrary.length === 0) {
    container.innerHTML = '<div style="font-size:10px;color:var(--text-muted);padding:4px 0">No training sessions saved</div>';
    return;
  }
  
  container.innerHTML = STATE.trainingLibrary.map(function(tr) {
    var durationSec = Math.round(tr.duration / 1000);
    return '<div class="pose-item" style="padding:4px 0"><div class="pose-info"><span class="pose-name" style="font-size:11px">' + tr.name + '</span><span class="pose-cat" style="font-size:9px">' + tr.frames.length + ' frames &#8226; ' + durationSec + 's</span></div>' +
    '<button class="btn-icon-tiny btn-play" data-training="' + tr.id + '" title="Play training">&#9654;</button></div>';
  }).join("");
  
  container.querySelectorAll(".btn-play").forEach(function(btn) {
    btn.addEventListener("click", function() {
      playTraining(btn.dataset.training);
    });
  });
}

function playTraining(trainingId) {
  var tr = STATE.trainingLibrary.find(function(t) { return t.id === trainingId; });
  if (!tr) return;
  
  showToast('Playing training: ' + tr.name);
  addLog("info", "Training", "Playing: " + tr.name);
  
  var index = 0;
  var interval = tr.duration / tr.frames.length;
  
  function playNextFrame() {
    if (index >= tr.frames.length) {
      showToast("Training playback completed: " + tr.name);
      return;
    }
    
    var frame = tr.frames[index];
    Object.keys(frame.servos).forEach(function(sid) {
      var val = frame.servos[sid];
      var servo = STATE.servos[parseInt(sid)];
      if (servo) {
        servo.pos = val;
        var sl = document.querySelector('[data-servo="' + sid + '"]');
        if (sl) sl.value = val;
        setText("servo-val-" + sid, val + "\u00B0");
        sendServoCommand(parseInt(sid), val);
      }
    });
    renderServoOverview();
    
    index++;
    setTimeout(playNextFrame, interval);
  }
  
  playNextFrame();
}

function renderPoseList() {
  var container = document.getElementById("pose-list");
  setText("pose-count", STATE.poses.length);
  if (!container) return;
  container.innerHTML = STATE.poses.map(function(p) {
    var isDefault = ["stand", "wave", "sit", "bow"].indexOf(p.id) !== -1;
    return '<div class="pose-item"><div class="pose-info"><span class="pose-name">' + p.name + '</span><span class="pose-cat">' + p.category + '</span></div>' +
    '<button class="btn-icon-tiny btn-play" data-pose="' + p.id + '" title="Load pose">&#9654;</button>' +
    (isDefault ? '' : '<button class="btn-icon-tiny btn-delete" data-pose-del="' + p.id + '" title="Delete">&#10005;</button>') + '</div>';
  }).join("");

  container.querySelectorAll(".btn-play").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var pose = STATE.poses.find(function(p) { return p.id === btn.dataset.pose; });
      if (!pose) return;
      Object.keys(pose.servos).forEach(function(sid) {
        var val = pose.servos[sid];
        var servo = STATE.servos[parseInt(sid)];
        if (servo) {
          servo.pos = val;
          var sl = document.querySelector('[data-servo="' + sid + '"]');
          if (sl) sl.value = val;
          setText("servo-val-" + sid, val + "\u00B0");
        }
      });
      renderServoOverview();
      showToast("Loaded pose: " + pose.name);
      addLog("info", "Motion", "Loaded pose: " + pose.name);
    });
  });

  container.querySelectorAll(".btn-delete").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var id = btn.dataset.poseDel;
      STATE.poses = STATE.poses.filter(function(p) { return p.id !== id; });
      renderPoseList();
      showToast("Pose removed");
    });
  });
}

// ── VOICE & CHAT ──
var AI_RESPONSES = {
  "navigate to kitchen": "Understood. Plotting route to kitchen via ARC navigation. Setting $Genesis_Command to navigate. Estimated arrival: 15 seconds.",
  "find guests": "Scanning environment for human presence. Activating face recognition via ARC Camera skill. Sweeping living room and dining area.",
  "entertain": "Entering entertainment mode! Sending dance routine to ARC Auto Position. Would you like me to tell a joke too?",
  "wave": "Executing wave gesture via ARC Auto Position. controlCommand('Auto Position','AutoPositionFrame','WAVE')",
  "stand": "Moving to standing position. controlCommand('Auto Position','AutoPositionFrame','STAND')",
  "sit": "Lowering to seated position. controlCommand('Auto Position','AutoPositionFrame','SIT')",
  "dance": "Starting dance routine! Sending sequence to ARC Auto Position skill.",
  "status": "All systems nominal. Battery at 78%, temperature 42C, all 18 servos responsive. ARC HTTP Server active on port 8080. Genesis AI running on port 5000.",
  "hello": "Hello! I'm Genesis, your Mini BFF humanoid robot assistant. I'm running through ARC with Genesis AI on this device. How can I help?",
  "help": "I can help with: navigation commands, pose control (wave, stand, sit, dance), finding people, entertainment routines, and system status."
};

function getResponse(input) {
  var lower = input.toLowerCase().trim();
  for (var key in AI_RESPONSES) {
    if (lower.indexOf(key) !== -1) return AI_RESPONSES[key];
  }
  return 'Processing command: "' + input + '". In production, this routes to Genesis AI (localhost:5000) which sets $Genesis_Command for ARC execution.';
}
// ── VOICE & CHAT ──
function initVoiceChat() {
  // Initialize Genesis Voice & Chat integration (uses voice-chat-integration.js)
  // This connects to Genesis AI server on port 5001 for real AI responses
  if (typeof initializeGenesisVoice === 'function') {
    initializeGenesisVoice();
    console.log('[Voice & Chat] Genesis AI integration initialized');
  } else {
    console.warn('[Voice & Chat] voice-chat-integration.js not loaded, using fallback');
    // Fallback to basic chat (old implementation)
    initVoiceChatFallback();
  }
}

// Fallback for when voice-chat-integration.js is not available
function initVoiceChatFallback() {
  var chatInput = document.getElementById("chat-input");
  var sendBtn = document.getElementById("btn-send");
  var micBtn = document.getElementById("btn-mic");
  var chatMessages = document.getElementById("chat-messages");

  function sendMessage(text) {
    if (!text || !text.trim()) return;
    appendMessage("user", text);
    addLog("info", "Voice", "User: " + text);
    setTimeout(function() {
      var response = getResponse(text);
      appendMessage("assistant", response);
      addLog("info", "AI", "Genesis: " + response.substring(0, 80) + "...");
      var ttsToggle = document.getElementById("tts-toggle");
      if (ttsToggle && ttsToggle.checked && "speechSynthesis" in window) {
        var utterance = new SpeechSynthesisUtterance(response);
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }
    }, 600 + Math.random() * 400);
  }

  function appendMessage(role, content) {
    if (!chatMessages) return;
    var isUser = role === "user";
    var div = document.createElement("div");
    div.className = "chat-msg " + (isUser ? "chat-user" : "chat-assistant");
    div.innerHTML = '<div class="chat-avatar ' + (isUser ? "chat-avatar-user" : "chat-avatar-bot") + '">' + (isUser ? "&#128100;" : "&#129302;") + '</div>' +
      '<div class="chat-bubble ' + (isUser ? "chat-bubble-user" : "chat-bubble-bot") + '"><p>' + content + '</p><span class="chat-time">' + new Date().toLocaleTimeString() + '</span></div>';
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  if (sendBtn) sendBtn.addEventListener("click", function() { sendMessage(chatInput ? chatInput.value : ""); if (chatInput) chatInput.value = ""; });
  if (chatInput) chatInput.addEventListener("keydown", function(e) { if (e.key === "Enter") { sendMessage(chatInput.value); chatInput.value = ""; } });

  if (micBtn) micBtn.addEventListener("click", function() {
    if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) { showToast("Speech recognition not supported"); return; }
    micBtn.classList.toggle("btn-active");
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    var recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = "en-US";
    recognition.onresult = function(event) { if (chatInput) chatInput.value = event.results[0][0].transcript; micBtn.classList.remove("btn-active"); };
    recognition.onerror = function() { micBtn.classList.remove("btn-active"); };
    recognition.onend = function() { micBtn.classList.remove("btn-active"); };
    recognition.start();
  });

  document.querySelectorAll(".quick-cmd").forEach(function(btn) {
    btn.addEventListener("click", function() { sendMessage(btn.dataset.cmd || ""); });
  });
}

// ── NAVIGATION ──
function initNavigationPanel() {
  renderWaypoints();
  renderMissionSteps();
  renderMapOverlays();
  var addBtn = document.getElementById("btn-add-wp");
  if (addBtn) addBtn.addEventListener("click", function() {

    var name = input ? input.value.trim() : "";

    renderMapOverlays();
    addLog("info", "Nav", "Added waypoint: " + name);
    showToast('Waypoint "' + name + '" added');
  });

  if (wpInput) wpInput.addEventListener("keydown", function(e) { if (e.key === "Enter") { var btn = document.getElementById("btn-add-wp"); if (btn) btn.click(); } });

function renderWaypoints() {
  var container = document.getElementById("waypoint-list");
  setText("wp-count-badge", STATE.waypoints.length + " waypoints");
  if (!container) return;
  container.innerHTML = STATE.waypoints.map(function(wp) {
    return '<div class="wp-item"><span class="wp-icon">&#128205;</span><span class="wp-name">' + wp.name + '</span><span class="wp-coords">(' + wp.x.toFixed(0) + '%, ' + wp.y.toFixed(0) + '%)</span><button class="btn-icon-tiny btn-delete" data-wp-del="' + wp.id + '" title="Remove">&#10005;</button></div>';
  }).join("");

      renderWaypoints();
      renderMapOverlays();
    });
  });
}

function renderMapOverlays() {
  var container = document.getElementById("map-overlays");
  if (!container) return;
  container.innerHTML = STATE.waypoints.map(function(wp) {
    return '<div class="map-waypoint" style="left:' + wp.x + '%;top:' + wp.y + '%"><div class="map-wp-pin">&#128205;</div><div class="map-wp-label">' + wp.name + '</div></div>';
  }).join("");
}

function renderMissionSteps() {
  var container = document.getElementById("mission-steps");
  if (!container) return;
  container.innerHTML = STATE.missionSteps.map(function(step) {
    var icon = step.status === "completed" ? "&#9989;" : step.status === "active" ? "&#9654;" : "&#9711;";
    var cls = step.status === "active" ? "step-active" : step.status === "completed" ? "step-done" : "";
    return '<div class="mission-step ' + cls + '"><span class="step-icon">' + icon + '</span><span class="step-text"><strong>' + step.action + '</strong> ' + step.target + '</span></div>';
  }).join("");
}

// ── ML & LEARNING ──
function initMLPanel() {
  renderSkillList();
  var searchInput = document.getElementById("skill-search");
  var catFilter = document.getElementById("skill-category-filter");
  if (searchInput) searchInput.addEventListener("input", renderSkillList);
  if (catFilter) catFilter.addEventListener("change", renderSkillList);
  var uploadZone = document.getElementById("upload-zone");
  if (uploadZone) uploadZone.addEventListener("click", function() { showToast("Feature coming soon - Video upload for motion extraction"); });
}

function renderSkillList() {
  var container = document.getElementById("skill-list");
  if (!container) return;
  var search = (document.getElementById("skill-search") || {}).value || "";
  var cat = (document.getElementById("skill-category-filter") || {}).value || "all";
  var filtered = STATE.skills.filter(function(s) {
    var matchSearch = !search || s.name.toLowerCase().indexOf(search.toLowerCase()) !== -1;
    var matchCat = cat === "all" || s.cat === cat;
    return matchSearch && matchCat;
  });
  setText("skill-count-badge", filtered.length + " skills");
  container.innerHTML = filtered.map(function(s) {
    var badgeClass = s.status === "learned" ? "skill-badge-learned" : "skill-badge-training";
    var barColor = s.rate >= 80 ? "var(--green)" : s.rate >= 50 ? "var(--amber)" : "var(--red)";
    var valColor = s.rate >= 80 ? "var(--green)" : s.rate >= 50 ? "var(--amber)" : "var(--red)";
    return '<div class="skill-item"><div class="skill-info"><div class="skill-name-row"><span class="skill-name">' + s.name + '</span><span class="skill-badge ' + badgeClass + '">' + s.status.toUpperCase() + '</span></div><div class="skill-meta">' + s.cat + ' &#8226; Used ' + s.used + ' times</div></div><div class="skill-rate"><div class="skill-rate-val" style="color:' + valColor + '">' + s.rate + '%</div><div class="skill-bar"><div class="skill-bar-fill" style="width:' + s.rate + '%;background:' + barColor + '"></div></div></div></div>';
  }).join("");
}

// ── SYSTEM MONITOR ──
function initSystemMonitor() {
  renderLogs();
  var logFilter = document.getElementById("log-filter");
  if (logFilter) logFilter.addEventListener("change", renderLogs);
}

function addLog(level, source, msg) {
  STATE.logs.push({ level: level, source: source, msg: msg });
  if (STATE.logs.length > 100) STATE.logs.shift();
  renderLogs();
}

function renderLogs() {
  var container = document.getElementById("log-list");
  if (!container) return;
  var filter = (document.getElementById("log-filter") || {}).value || "all";
  var filtered = STATE.logs.filter(function(l) { return filter === "all" || l.level === filter; });
  setText("log-count", filtered.length);
  var now = new Date();
  container.innerHTML = filtered.slice().reverse().map(function(l, i) {
    var t = new Date(now.getTime() - i * 30000);
    var ts = pad(t.getHours()) + ":" + pad(t.getMinutes()) + ":" + pad(t.getSeconds());
    var icon = l.level === "error" ? "&#10060;" : l.level === "warn" ? "&#9888;" : "&#8505;";
    var srcClass = l.level === "error" ? "log-source-error" : l.level === "warn" ? "log-source-warn" : "log-source-info";
    return '<div class="log-entry"><span class="log-icon">' + icon + '</span><span class="log-time">' + ts + '</span><span class="log-source ' + srcClass + '">' + l.source + '</span><span class="log-msg">' + l.msg + '</span></div>';
  }).join("");
}

// ── QUICK ACTIONS ──
function initQuickActions() {
  document.querySelectorAll(".action-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var action = btn.dataset.action;
      if (!action) return;
      var pose = STATE.poses.find(function(p) { return p.id === action; });
      if (pose) {
        Object.keys(pose.servos).forEach(function(sid) {
          var servo = STATE.servos[parseInt(sid)];
          if (servo) servo.pos = pose.servos[sid];
        });
        renderServoOverview();
      }
      addLog("info", "Action", "Quick action: " + action);
      showToast("Executing: " + action);
    });
  });
}

// ── E-STOP ──
function initEStop() {
  var btn = document.getElementById("btn-estop");
  if (btn) btn.addEventListener("click", function() {
    STATE.servos.forEach(function(s) { s.pos = 90; });
    renderServoOverview();
    addLog("error", "E-STOP", "EMERGENCY STOP ACTIVATED - All servos to neutral");
    showToast("EMERGENCY STOP - All servos neutral");
    // ARC integration: fetch('http://localhost:8080/exec.html?code=Halt()');
  });
}

// ── SIMULATION ──
function startSimulation() {
  setInterval(function() {
    STATE.battery = Math.max(5, STATE.battery - 0.001 + (Math.random() - 0.5) * 0.1);
    STATE.temperature = 38 + Math.sin(Date.now() / 50000) * 5 + Math.random() * 2;
    STATE.uptime++;

    STATE.sensorHistory.battery.push(STATE.battery);
    STATE.sensorHistory.temp.push(STATE.temperature);
    STATE.sensorHistory.distance.push(50 + Math.sin(Date.now() / 8000) * 30 + Math.random() * 5);
    STATE.sensorHistory.imuX.push(Math.sin(Date.now() / 5000) * 0.3 + Math.random() * 0.1);
    STATE.sensorHistory.imuY.push(Math.cos(Date.now() / 5000) * 0.2 + Math.random() * 0.1);
    STATE.sensorHistory.imuZ.push(9.8 + Math.random() * 0.1);

    var keys = ["battery", "temp", "distance", "imuX", "imuY", "imuZ"];
    keys.forEach(function(k) { if (STATE.sensorHistory[k].length > 30) STATE.sensorHistory[k].shift(); });

    setText("battery-value", Math.round(STATE.battery) + "%");
    setText("temp-value", Math.round(STATE.temperature) + "\u00B0C");
    var hrs = Math.floor(STATE.uptime / 3600);
    var mins = Math.floor((STATE.uptime % 3600) / 60);
    var secs = STATE.uptime % 60;
    setText("uptime-value", pad(hrs) + ":" + pad(mins) + ":" + pad(secs));

    setText("dash-battery", Math.round(STATE.battery) + "%");
    setText("dash-temp", Math.round(STATE.temperature) + "\u00B0C");
    setText("dash-distance", Math.round(STATE.sensorHistory.distance[STATE.sensorHistory.distance.length - 1]) + "cm");
    var bar = document.getElementById("battery-bar");
    if (bar) bar.style.width = STATE.battery + "%";

    setText("sys-cpu", (25 + Math.random() * 20).toFixed(0) + "%");
    setText("sys-mem", (3.5 + Math.random() * 1.5).toFixed(1) + " GB");
    setText("sys-batt", Math.round(STATE.battery) + "%");
    setText("sys-temp", Math.round(STATE.temperature) + "\u00B0C");
    setText("sys-net", (8 + Math.random() * 10).toFixed(0) + "ms");
    setText("sys-uptime-sub", hrs + "h " + mins + "m");
    setText("latency-value", (8 + Math.random() * 10).toFixed(0) + "ms");

    updateCharts();
  }, 2000);
}
